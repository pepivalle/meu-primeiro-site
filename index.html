<!DOCTYPE html>
<html>
<head>
    <title>Meu Primeiro Site</title>

    <style>
        body{
            font-family: Arial;
            text-align:center;
            margin-top:50px;
        }

        input{
            padding:10px;
        }

        button{
            padding:10px;
            cursor:pointer;
        }

        #resultado{
            margin-top:20px;
            font-size:20px;
        }
    </style>
</head>

<body>

<h1>Verificador de Número</h1>

<input id="numero" type="number">

<button onclick="verificar()">
Verificar
</button>

<p id="resultado"></p>

<script>

function verificar(){

    let numero =
    document.getElementById("numero").value;

    if(numero % 2 == 0){
        document.getElementById("resultado")
        .innerHTML =
        "Número PAR";
    }

    else{
        document.getElementById("resultado")
        .innerHTML =
        "Número ÍMPAR";
    }

}

</script>

</body>
</html>
